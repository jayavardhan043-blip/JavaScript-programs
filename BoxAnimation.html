<!DOCTYPE html>
<html>
<head>

<style>

#container{
width:500px;
height:300px;
border:2px solid black;
position:relative;
}

#box{
width:50px;
height:50px;
background:red;
position:absolute;
}

</style>

</head>

<body>

<div id="container">
<div id="box"></div>
</div>

<br>

<button onclick="startAnimation()">Start</button>

<script>

function startAnimation(){

let box=document.getElementById("box");

let pos=0;

let id=setInterval(frame,10);

function frame(){

if(pos>=450){
clearInterval(id);
}
else{

pos++;

box.style.left=pos+"px";
box.style.top=(pos/2)+"px";
box.style.backgroundColor="blue";

}

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body>
    <div>Box 1</div>
    <div>Box 2</div>
    <div>Box 3</div>
    <button onclick = "changeBackground()">Click</button>
    <script>
        function changeBackground() {
            let boxes = document.querySelectorAll("div");
            boxes.forEach(function(box) {
                box.style.backgroundColor = "lightblue";
            });
        }
    </script>
</body>
</html>

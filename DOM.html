<!DOCTYPE html>
<html>
<head>
    <title>DOM Practice</title>
</head>
<body>

<h1 id="heading">JavaScript DOM</h1>

<p class="demo">Paragraph 1</p>
<p class="demo">Paragraph 2</p>

<img id="image" src="https://via.placeholder.com/150">

<br><br>

<button id="btn">Click Me</button>

<div id="container"></div>

<script>

// Select by ID
let heading = document.getElementById("heading");
heading.innerHTML = "Learning HTML DOM";
heading.style.color = "green";

// Select by Class
let paragraphs = document.getElementsByClassName("demo");

for(let i = 0; i < paragraphs.length; i++){
    paragraphs[i].style.color = "blue";
}

// Change Attribute
document.getElementById("image").src =
"https://via.placeholder.com/200";

// Create New Element
let newPara = document.createElement("p");
newPara.textContent = "This paragraph was created using JavaScript.";
document.getElementById("container").appendChild(newPara);

// Event Listener
document.getElementById("btn").addEventListener("click", function(){
    alert("Button Clicked!");
});

</script>

</body>
</html>
